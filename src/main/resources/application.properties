spring.application.name=portal-editais
server.port = 8282

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
logging.level.org.hibernate.orm.connections.pooling=ERROR
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Configuracao de conexao com o banco de dados
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLDB_URL}:${MYSQLDB_PORT}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQLDB_USER}
spring.datasource.password=${MYSQL_ROOT_PASSWORD}

# Token
app.security.token.secret = YWFkZmFkYWRhZmFkYXNkYjFkYWZkYXNkYmFkYWRkYXNkZGVmYWQ=

# Configuracao do tamanho maximo permitido para upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB


